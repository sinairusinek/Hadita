<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; font-size: 12px; background: #fff; }
  .wrap { overflow-x: auto; max-height: 75vh; overflow-y: auto; }
  table { border-collapse: collapse; table-layout: fixed; }
  th {
    position: sticky; top: 0; z-index: 2;
    background: #e8e8e8; border: 1px solid #aaa;
    padding: 3px 4px; font-size: 10px; text-align: center;
    min-width: 90px; max-width: 140px; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
  }
  th.row-num { min-width: 30px; max-width: 30px; background: #d0d0d0; }
  td {
    border: 1px solid #ccc; padding: 2px; vertical-align: top;
    text-align: center; min-width: 90px; max-width: 140px;
  }
  td.row-num {
    min-width: 30px; max-width: 30px;
    font-weight: bold; color: #555; background: #f5f5f5;
    vertical-align: middle;
  }
  td img { max-width: 130px; max-height: 55px; display: block; margin: 0 auto 2px; }
  td input {
    width: 100%; border: 1px solid #bbb; padding: 2px 3px;
    font-size: 11px; background: transparent; outline: none;
  }
  td input:focus { border-color: #4a90d9; background: #f0f7ff; }
  tr.low-conf td  { background-color: #ffe0e0; }
  tr.med-conf td  { background-color: #fff8db; }
  tr.low-conf td.row-num { background-color: #ffcccc; }
  tr.med-conf td.row-num { background-color: #fff3cd; }
</style>
</head>
<body>
<div class="wrap">
  <table id="grid"></table>
</div>
<script>
  // Streamlit component lib communication
  function sendToStreamlit(data) {
    window.parent.postMessage({type: "streamlit:setComponentValue", value: data}, "*");
  }
  function setFrameHeight() {
    const h = document.body.scrollHeight + 20;
    window.parent.postMessage({type: "streamlit:setFrameHeight", height: h}, "*");
  }

  let _args = null;

  function buildTable(args) {
    _args = args;
    const {col_names, n_rows, cell_images, cell_values, confidences} = args;
    const n_cols = col_names.length;
    const tbl = document.getElementById("grid");
    tbl.innerHTML = "";

    // Header
    const thead = tbl.createTHead();
    const hrow = thead.insertRow();
    const thNum = document.createElement("th");
    thNum.className = "row-num";
    thNum.textContent = "#";
    hrow.appendChild(thNum);
    col_names.forEach(name => {
      const th = document.createElement("th");
      th.textContent = name;
      th.title = name;
      hrow.appendChild(th);
    });

    // Body
    const tbody = tbl.createTBody();
    for (let r = 0; r < n_rows; r++) {
      const tr = tbody.insertRow();
      const conf = (confidences[r] || "high").toLowerCase();
      if (conf === "low")    tr.className = "low-conf";
      else if (conf === "medium") tr.className = "med-conf";

      // Row number cell
      const tdNum = tr.insertCell();
      tdNum.className = "row-num";
      tdNum.textContent = r + 1;

      for (let c = 0; c < n_cols; c++) {
        const td = tr.insertCell();
        const idx = r * n_cols + c;
        const imgSrc = cell_images[idx] || "";
        const val    = cell_values[idx]  || "";

        if (imgSrc) {
          const img = document.createElement("img");
          img.src = imgSrc;
          td.appendChild(img);
        }

        const inp = document.createElement("input");
        inp.type = "text";
        inp.value = val;
        inp.dataset.row = r;
        inp.dataset.col = c;

        inp.addEventListener("keydown", function(e) {
          if (e.key === "Enter" || e.key === "ArrowDown") {
            e.preventDefault();
            moveFocus(r + 1, c);
          } else if (e.key === "ArrowUp") {
            e.preventDefault();
            moveFocus(r - 1, c);
          } else if (e.key === "ArrowRight" && this.selectionStart === this.value.length) {
            e.preventDefault();
            moveFocus(r, c + 1);
          } else if (e.key === "ArrowLeft" && this.selectionStart === 0) {
            e.preventDefault();
            moveFocus(r, c - 1);
          }
        });

        inp.addEventListener("change", function() {
          notifyChange();
        });

        td.appendChild(inp);
      }
    }
    setFrameHeight();
  }

  function moveFocus(r, c) {
    const inp = document.querySelector(`input[data-row="${r}"][data-col="${c}"]`);
    if (inp) { inp.focus(); inp.select(); }
  }

  function notifyChange() {
    if (!_args) return;
    const inputs = document.querySelectorAll("#grid input");
    const values = Array.from(inputs).map(i => i.value);
    sendToStreamlit({changed: true, values: values});
  }

  // Listen for Streamlit render events
  window.addEventListener("message", function(e) {
    if (e.data.type === "streamlit:render") {
      buildTable(e.data.args);
    }
  });

  // Signal ready to Streamlit
  window.parent.postMessage({type: "streamlit:componentReady", apiVersion: 1}, "*");
</script>
</body>
</html>
